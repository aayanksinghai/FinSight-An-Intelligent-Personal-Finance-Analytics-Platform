      PQIDAQAB
      -----END PUBLIC KEY-----

ingestion:
  kafka:
    topic: transactions.ingested
  supported-types:
    - text/csv
    - application/vnd.ms-excel
    - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
    - application/pdf
    - application/octet-stream

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
