spring:
  application:
    name: user-service
  datasource:
    url: ${DB_USER_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
    repair-on-migrate: true

security:
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID}
  auth:
    dev-user:
      email: demo@finsight.local
      password: Passw0rd!123
    dev-admin:
      email: admin@finsight.local
      password: Adm1nP@ss!
    password-reset-expiry-seconds: 900
  jwt:
    issuer: ${JWT_ISSUER}
    expiry-seconds: 3600
    refresh-expiry-seconds: 604800
    public-key: ${JWT_PUBLIC_KEY}
    private-key: ${JWT_PRIVATE_KEY}
  tokens:
    cleanup-interval-ms: 900000
    cleanup-retention-seconds: 259200

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
