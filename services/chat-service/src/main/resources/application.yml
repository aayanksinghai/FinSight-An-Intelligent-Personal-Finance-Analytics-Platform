      WOAXlPyozGH10AIzWHvhiKKo9qssXDftthpjqZKD2DQNQUUDcaeYOMD6aacfdIcn
      PQIDAQAB
      -----END PUBLIC KEY-----

services:
  transaction-service-url: ${TRANSACTION_SERVICE_URL:http://localhost:8083}
  budget-service-url: ${BUDGET_SERVICE_URL:http://localhost:8084}
  notification-service-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}

server:
  port: 8087

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
