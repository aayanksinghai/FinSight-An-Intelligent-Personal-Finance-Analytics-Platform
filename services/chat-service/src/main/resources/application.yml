spring:
  application:
    name: chat-service
  datasource:
    url: ${DB_USER_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    repair-on-migrate: true
    baseline-version: "0"
    table: flyway_schema_history_chat
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

security:
  jwt:
    issuer: ${JWT_ISSUER}
    public-key: ${JWT_PUBLIC_KEY}

services:
  transaction-service-url: ${TRANSACTION_SERVICE_URL:http://localhost:8083}
  budget-service-url: ${BUDGET_SERVICE_URL:http://localhost:8084}
  notification-service-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}

server:
  port: 8087

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
