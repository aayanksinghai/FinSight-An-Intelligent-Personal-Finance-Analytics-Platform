spring:
  application:
    name: admin-service

  datasource:
    url: ${DB_USER_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    repair-on-migrate: true
    table: flyway_schema_history_admin

server:
  port: 8088

security:
  jwt:
    issuer: ${JWT_ISSUER}
    public-key: ${JWT_PUBLIC_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

