services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2185:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9095:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  redis:
    image: redis:7-alpine
    ports:
      - "6385:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: finsight
      POSTGRES_PASSWORD: finsight
      POSTGRES_DB: finsight_user
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7.0
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - cluster.routing.allocation.disk.watermark.flood_stage=99%
      - cluster.routing.allocation.disk.watermark.high=98%
      - cluster.routing.allocation.disk.watermark.low=95%
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.1
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./elk/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    ports:
      - "5601:5601"
    volumes:
      - ./elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  api-gateway:
    image: aayanksinghai/finsight-api-gateway:latest
    build:
      context: ./services/api-gateway-service
    ports:
      - "8095:8090"
    environment:
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      LOGSTASH_HOST: logstash
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms256m"
    depends_on:
      - user-service
      - transaction-service
      - budget-service
      - ingestion-service
      - notification-service
      - logstash

  user-service:
    image: aayanksinghai/finsight-user-service:latest
    build:
      context: ./services/user-service
    environment:
      DB_USER_URL: ${DB_USER_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
      SPRING_FLYWAY_VERSION: "0"
      SPRING_FLYWAY_TABLE: "flyway_schema_history_user"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
      LOGSTASH_HOST: logstash
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms256m"
    depends_on:
      - postgres
      - redis
      - kafka
      - logstash

  transaction-service:
    image: aayanksinghai/finsight-transaction-service:latest
    build:
      context: ./services/transaction-service
    environment:
      DB_TRANSACTION_URL: ${DB_TRANSACTION_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
      SPRING_FLYWAY_VERSION: "0"
      SPRING_FLYWAY_TABLE: "flyway_schema_history_transaction"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
      LOGSTASH_HOST: logstash
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms256m"
    depends_on:
      - postgres
      - redis
      - kafka
      - logstash

  budget-service:
    image: aayanksinghai/finsight-budget-service:latest
    build:
      context: ./services/budget-service
    environment:
      DB_USER_URL: ${DB_USER_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
      SPRING_FLYWAY_VERSION: "0"
      SPRING_FLYWAY_TABLE: "flyway_schema_history_budget"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
      LOGSTASH_HOST: logstash
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms256m"
    depends_on:
      - postgres
      - redis
      - kafka
      - logstash

  ingestion-service:
    image: aayanksinghai/finsight-ingestion-service:latest
    build:
      context: ./services/ingestion-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_DATA_MONGODB_URI: ${MONGODB_URI}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      LOGSTASH_HOST: logstash
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms256m"
    depends_on:
      - kafka
      - mongodb
      - logstash

  notification-service:
    image: aayanksinghai/finsight-notification-service:latest
    build:
      context: ./services/notification-service
    environment:
      DB_USER_URL: ${DB_USER_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
      SPRING_FLYWAY_VERSION: "0"
      SPRING_FLYWAY_TABLE: "flyway_schema_history_notification"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
      LOGSTASH_HOST: logstash
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms256m"
    depends_on:
      - postgres
      - kafka
      - logstash

  admin-service:
    image: aayanksinghai/finsight-admin-service:latest
    build:
      context: ./services/admin-service
    ports:
      - "8088:8088"
    environment:
      DB_USER_URL: ${DB_USER_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
      SPRING_FLYWAY_VERSION: "0"
      SPRING_FLYWAY_TABLE: "flyway_schema_history_admin"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
      LOGSTASH_HOST: logstash
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms256m"
    depends_on:
      - postgres
      - kafka
      - logstash

  categorization-service:
    image: aayanksinghai/finsight-categorization-service:latest
    build:
      context: ./services/categorization-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms256m"
    depends_on:
      - kafka

  anomaly-detection-service:
    image: aayanksinghai/finsight-anomaly-detection-service:latest
    build:
      context: ./services/anomaly-detection-service
    environment:
      KAFKA_BROKERS: ${KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      - kafka

  chat-service:
    image: aayanksinghai/finsight-chat-service:latest
    build:
      context: ./services/chat-service
    environment:
      DB_USER_URL: ${DB_USER_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TRANSACTION_SERVICE_URL: http://transaction-service:8083
      BUDGET_SERVICE_URL: http://budget-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
      SPRING_FLYWAY_VERSION: "0"
      SPRING_FLYWAY_TABLE: "flyway_schema_history_chat"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
      LOGSTASH_HOST: logstash
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms256m"
    depends_on:
      - kafka
      - logstash

  forecasting-service:
    image: aayanksinghai/finsight-forecasting-service:latest
    build:
      context: ./services/forecasting-service
    ports:
      - "8000:8000"
    environment:
      DB_URL: postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/finsight_user?options=-csearch_path%3Dtransaction_schema
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      - postgres

  frontend:
    image: aayanksinghai/finsight-frontend:latest
    build:
      context: ./frontend
      args:
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    ports:
      - "5175:80"
    depends_on:
      - api-gateway

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  redis_data:
  postgres_data:
  mongodb_data:
  elasticsearch_data:
