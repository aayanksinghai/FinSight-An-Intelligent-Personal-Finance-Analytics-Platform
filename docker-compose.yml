services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2185:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9095:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  redis:
    image: redis:7-alpine
    ports:
      - "6385:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: finsight
      POSTGRES_PASSWORD: finsight
      POSTGRES_DB: finsight_user
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7.0
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  api-gateway:
    image: aayanksinghai/finsight-api-gateway:latest
    build:
      context: ./services/api-gateway-service
    ports:
      - "8095:8090"
    depends_on:
      - user-service
      - transaction-service
      - budget-service
      - ingestion-service
      - notification-service

  user-service:
    image: aayanksinghai/finsight-user-service:latest
    build:
      context: ./services/user-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finsight_user
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      SPRING_FLYWAY_TABLE: "flyway_schema_history_user"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
    depends_on:
      - postgres
      - redis
      - kafka

  transaction-service:
    image: aayanksinghai/finsight-transaction-service:latest
    build:
      context: ./services/transaction-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finsight_user
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      SPRING_FLYWAY_TABLE: "flyway_schema_history_transaction"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
    depends_on:
      - postgres
      - redis
      - kafka

  budget-service:
    image: aayanksinghai/finsight-budget-service:latest
    build:
      context: ./services/budget-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finsight_user
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      SPRING_FLYWAY_TABLE: "flyway_schema_history_budget"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
    depends_on:
      - postgres
      - redis
      - kafka

  ingestion-service:
    image: aayanksinghai/finsight-ingestion-service:latest
    build:
      context: ./services/ingestion-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_MONGODB_URI: "mongodb://mongodb:27017/finsight_ingestion"
    depends_on:
      - kafka
      - mongodb

  notification-service:
    image: aayanksinghai/finsight-notification-service:latest
    build:
      context: ./services/notification-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finsight_user
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      SPRING_FLYWAY_TABLE: "flyway_schema_history_notification"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
    depends_on:
      - postgres
      - kafka

  admin-service:
    image: aayanksinghai/finsight-admin-service:latest
    build:
      context: ./services/admin-service
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finsight_user
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      SPRING_FLYWAY_TABLE: "flyway_schema_history_admin"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
    depends_on:
      - postgres
      - kafka

  categorization-service:
    image: aayanksinghai/finsight-categorization-service:latest
    build:
      context: ./services/categorization-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka

  anomaly-detection-service:
    image: aayanksinghai/finsight-anomaly-detection-service:latest
    build:
      context: ./services/anomaly-detection-service
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - kafka

  chat-service:
    image: aayanksinghai/finsight-chat-service:latest
    build:
      context: ./services/chat-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finsight_user
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TRANSACTION_SERVICE_URL: http://transaction-service:8083
      BUDGET_SERVICE_URL: http://budget-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      SPRING_FLYWAY_TABLE: "flyway_schema_history_chat"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
    depends_on:
      - kafka

  frontend:
    image: aayanksinghai/finsight-frontend:latest
    build:
      context: ./frontend
    ports:
      - "5175:80"
    depends_on:
      - api-gateway

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  redis_data:
  postgres_data:
  mongodb_data:
