input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # Add environment tag
  mutate {
    add_field => { "environment" => "docker" }
  }

  # Parse the log level to uppercase for consistency
  if [level] {
    mutate {
      uppercase => [ "level" ]
    }
  }

  # Extract caller info if present
  if [caller_class_name] {
    mutate {
      rename => { "caller_class_name" => "logger_class" }
    }
  }

  # Remove internal Logback fields we don't need
  mutate {
    remove_field => [ "@version", "port" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "finsight-logs-%{+YYYY.MM.dd}"
    action => "index"
  }

  # Also output to stdout for Logstash container debugging
  stdout {
    codec => rubydebug {
      metadata => false
    }
  }
}
