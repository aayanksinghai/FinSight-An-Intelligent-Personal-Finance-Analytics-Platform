---
# ── Categorization Service (Python/FastAPI) ──────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: categorization-service
  namespace: finsight
  labels:
    app: categorization-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: categorization-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: categorization-service
    spec:
      containers:
        - name: categorization-service
          image: aayanksinghai/finsight-categorization-service:latest
          ports:
            - containerPort: 8085
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: finsight-config
                  key: KAFKA_BOOTSTRAP_SERVERS
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: categorization-service
  namespace: finsight
spec:
  selector:
    app: categorization-service
  ports:
    - port: 8085
      targetPort: 8085
---
# ── HPA: Categorization Service ──────────────────────────────────────────────
# Scales from 2 → 8 replicas when CPU utilization exceeds 70%.
# Matches requirement: "ML inference service must be configured with
# Kubernetes HPA to scale from 2 to 8 replicas based on CPU > 70%"
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: categorization-service-hpa
  namespace: finsight
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: categorization-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
