---
# ── Logstash ConfigMap ───────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  namespace: finsight
data:
  finsight.conf: |
    input {
      tcp {
        port => 5044
        codec => json_lines
      }
    }
    filter {
      mutate {
        add_field => { "environment" => "kubernetes" }
        remove_field => [ "@version", "port" ]
      }
      if [level] {
        mutate { uppercase => [ "level" ] }
      }
    }
    output {
      elasticsearch {
        hosts => ["elasticsearch:9200"]
        index => "finsight-logs-%{+YYYY.MM.dd}"
        action => "index"
      }
    }
---
# ── Logstash Deployment ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: finsight
  labels:
    app: logstash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.11.1
          ports:
            - containerPort: 5044
            - containerPort: 9600
          env:
            - name: LS_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
          volumeMounts:
            - name: pipeline
              mountPath: /usr/share/logstash/pipeline
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: pipeline
          configMap:
            name: logstash-pipeline
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: finsight
spec:
  selector:
    app: logstash
  ports:
    - name: tcp-input
      port: 5044
      targetPort: 5044
    - name: api
      port: 9600
      targetPort: 9600
